<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لعبة الثعبان</title>

<style>
body {
    background: #000;
    text-align: center;
    color: white;
    font-family: Arial;
}

canvas {
    background: #111;
    box-shadow: 0 0 20px lime;
    margin-top: 10px;
}

#controls {
    margin-top: 15px;
}

button {
    width: 70px;
    height: 50px;
    font-size: 20px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    background: lime;
}
</style>
</head>

<body>

<h2>🐍 لعبة الثعبان</h2>
<canvas id="game" width="300" height="300"></canvas>
<div>النقاط: <span id="score">0</span></div>

<div id="controls">
    <br>
    <button onclick="setDir('UP')">⬆️</button><br>
    <button onclick="setDir('LEFT')">⬅️</button>
    <button onclick="setDir('DOWN')">⬇️</button>
    <button onclick="setDir('RIGHT')">➡️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let box = 20;
let snake = [{x: 160, y: 160}];
let direction = "RIGHT";

let food = {
    x: Math.floor(Math.random()*15)*box,
    y: Math.floor(Math.random()*15)*box
};

let score = 0;

function setDir(dir){
    direction = dir;
}

function draw(){
    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,300,300);

    // الثعبان
    snake.forEach((part,i)=>{
        ctx.fillStyle = i==0 ? "#00ff00" : "#00aa00";
        ctx.fillRect(part.x, part.y, box, box);
    });

    // الأكل
    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, box, box);

    let headX = snake[0].x;
    let headY = snake[0].y;

    if(direction=="LEFT") headX -= box;
    if(direction=="RIGHT") headX += box;
    if(direction=="UP") headY -= box;
    if(direction=="DOWN") headY += box;

    // أكل
    if(headX == food.x && headY == food.y){
        score++;
        document.getElementById("score").innerText = score;
        food = {
            x: Math.floor(Math.random()*15)*box,
            y: Math.floor(Math.random()*15)*box
        };
    } else {
        snake.pop();
    }

    let newHead = {x: headX, y: headY};

    // تصادم
    if(headX<0 || headY<0 || headX>=300 || headY>=300 || collision(newHead)){
        alert("خسرت 😢 نقاطك: " + score);
        snake = [{x:160,y:160}];
        score = 0;
    }

    snake.unshift(newHead);
}

function collision(head){
    for(let i=0;i<snake.length;i++){
        if(head.x==snake[i].x && head.y==snake[i].y){
            return true;
        }
    }
    return false;
}

setInterval(draw,120);
</script>

</body>
</html>
