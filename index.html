<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Snake Nokia Style</title>

<style>
body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:Arial;
}

/* جسم الموبايل */
.phone{
    width:260px;
    background:#222;
    border-radius:30px;
    padding:15px;
    box-shadow:0 0 20px #000;
}

/* الشاشة */
.screen{
    background:black;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 15px lime inset;
    text-align:center;
}

canvas{
    background:#000;
}

/* الأزرار */
.keys{
    margin-top:15px;
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:8px;
}

button{
    height:45px;
    border:none;
    border-radius:10px;
    font-size:18px;
    background:#555;
    color:white;
}

button:active{
    background:lime;
    color:black;
}

.score{
    color:white;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="phone">

    <div class="screen">
        <canvas id="game" width="200" height="200"></canvas>
        <div class="score">النقاط: <span id="score">0</span></div>
    </div>

    <div class="keys">
        <div></div>
        <button onclick="setDir('UP')">▲</button>
        <div></div>

        <button onclick="setDir('LEFT')">◀</button>
        <button onclick="setDir('DOWN')">▼</button>
        <button onclick="setDir('RIGHT')">▶</button>
    </div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let box = 20;
let snake = [{x:100,y:100}];
let dir = "RIGHT";

let food = randomFood();
let score = 0;

function randomFood(){
    return {
        x: Math.floor(Math.random()*10)*box,
        y: Math.floor(Math.random()*10)*box
    };
}

function setDir(d){
    if(d=="LEFT" && dir!="RIGHT") dir="LEFT";
    if(d=="RIGHT" && dir!="LEFT") dir="RIGHT";
    if(d=="UP" && dir!="DOWN") dir="UP";
    if(d=="DOWN" && dir!="UP") dir="DOWN";
}

function draw(){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,200,200);

    // الثعبان
    snake.forEach((p,i)=>{
        ctx.fillStyle = i==0 ? "lime" : "green";
        ctx.fillRect(p.x,p.y,box,box);
    });

    // الأكل
    ctx.fillStyle="red";
    ctx.fillRect(food.x,food.y,box,box);

    let headX = snake[0].x;
    let headY = snake[0].y;

    if(dir=="LEFT") headX-=box;
    if(dir=="RIGHT") headX+=box;
    if(dir=="UP") headY-=box;
    if(dir=="DOWN") headY+=box;

    if(headX==food.x && headY==food.y){
        score++;
        document.getElementById("score").innerText = score;
        food = randomFood();
    } else {
        snake.pop();
    }

    let newHead = {x:headX,y:headY};

    if(headX<0 || headY<0 || headX>=200 || headY>=200 || hit(newHead)){
        alert("💀 خسرت! نقاطك: " + score);
        location.reload();
    }

    snake.unshift(newHead);
}

function hit(head){
    return snake.some(p => p.x==head.x && p.y==head.y);
}

setInterval(draw,150);
</script>

</body>
</html>
